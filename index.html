<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>365 Albums</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --surface3: #222222;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --text-muted: #666;
    --text-dim: #999;
    --c0: #7a4f2e;
    --c1: #8b5a2b;
    --c2: #9a6535;
    --c3: #a8713f;
    --c4: #1a6b6b;
    --c5: #1d7a7a;
    --c6: #228888;
    --c7: #5b3fa8;
    --c8: #6a4abf;
    --c9: #7a55d4;
    --c10: #e040c8;
    --gold: #f5c842;
    --fav: #e05050;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
  }

  /* noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ── HEADER ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: env(safe-area-inset-top, 0) 0 0;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    gap: 12px;
  }

  .header-left h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, #aaa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-left .sub {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .progress-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 12px;
    flex-shrink: 0;
  }

  .progress-pill .count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: #fff;
    line-height: 1;
  }

  .progress-pill .total {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
  }

  .progress-ring-wrap {
    position: relative;
    width: 32px;
    height: 32px;
  }

  .progress-ring-wrap svg {
    transform: rotate(-90deg);
  }

  .ring-bg { fill: none; stroke: var(--border); stroke-width: 3; }
  .ring-fill {
    fill: none;
    stroke: var(--c10);
    stroke-width: 3;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s ease;
  }

  /* ── NAV TABS ── */
  .nav-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }

  .nav-tab {
    flex: 1;
    min-width: 70px;
    padding: 10px 6px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    white-space: nowrap;
  }

  .nav-tab.active {
    color: #fff;
  }

  .nav-tab.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 20%;
    right: 20%;
    height: 2px;
    background: var(--c10);
    border-radius: 2px 2px 0 0;
  }

  /* ── MAIN ── */
  .main {
    padding: 16px 14px;
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 100px);
    position: relative;
    z-index: 1;
  }

  /* ── SORT / FILTER BAR ── */
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .toolbar::-webkit-scrollbar { display: none; }

  .tool-btn {
    flex-shrink: 0;
    padding: 6px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .tool-btn.active, .tool-btn:active {
    background: var(--surface3);
    border-color: #555;
    color: #fff;
  }

  /* ── ALBUM GRID ── */
  .album-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .album-card {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    aspect-ratio: 1;
    cursor: pointer;
    background: var(--surface2);
    transition: transform 0.15s ease;
  }

  .album-card:active { transform: scale(0.96); }

  .album-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .album-card .cover-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 4px;
    background: var(--surface3);
    padding: 8px;
    text-align: center;
  }

  .cover-placeholder .ph-title {
    font-size: 9px;
    font-weight: 700;
    color: var(--text-dim);
    line-height: 1.2;
    word-break: break-word;
  }

  .cover-placeholder .ph-artist {
    font-size: 8px;
    color: var(--text-muted);
  }

  /* rating badge */
  .rating-badge {
    position: absolute;
    bottom: 5px;
    left: 5px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    padding: 2px 6px;
    border-radius: 5px;
    line-height: 1;
    letter-spacing: 0.5px;
  }

  /* overlay gradient */
  .album-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
    pointer-events: none;
  }

  /* crown */
  .crown-badge {
    position: absolute;
    top: 4px;
    right: 4px;
    font-size: 16px;
    z-index: 3;
    filter: drop-shadow(0 0 4px rgba(245,200,66,0.8));
  }

  /* fav heart */
  .fav-badge {
    position: absolute;
    top: 4px;
    left: 4px;
    font-size: 13px;
    z-index: 3;
  }

  /* 10 glow */
  .album-card.is-ten {
    box-shadow: 0 0 0 2px var(--c10), 0 0 20px rgba(224,64,200,0.4);
  }

  .album-card.is-ten::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(224,64,200,0.15) 0%, transparent 60%);
    z-index: 1;
    pointer-events: none;
  }

  .ten-emoji {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    z-index: 2;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.8));
    pointer-events: none;
  }

  /* ── LIST VIEW ── */
  .album-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .list-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .list-item:active { transform: scale(0.98); }

  .list-item.is-ten {
    border-color: var(--c10);
    box-shadow: 0 0 12px rgba(224,64,200,0.2);
  }

  .list-thumb {
    width: 52px;
    height: 52px;
    border-radius: 7px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface3);
  }

  .list-thumb-placeholder {
    width: 52px;
    height: 52px;
    border-radius: 7px;
    background: var(--surface3);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .list-info {
    flex: 1;
    min-width: 0;
  }

  .list-title {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .list-artist {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .list-meta {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 4px;
  }

  .genre-tag {
    font-size: 9px;
    background: var(--surface3);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 2px 6px;
    border-radius: 999px;
    font-family: 'Space Mono', monospace;
  }

  .list-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    flex-shrink: 0;
  }

  .list-rating {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    line-height: 1;
    letter-spacing: 1px;
  }

  .list-icons {
    display: flex;
    gap: 4px;
    font-size: 12px;
  }

  /* ── STATS VIEW ── */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
  }

  .stat-card.wide { grid-column: 1 / -1; }

  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    line-height: 1;
    letter-spacing: 1px;
    color: #fff;
  }

  .stat-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .tier-bars { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }

  .tier-row { display: flex; align-items: center; gap: 8px; }

  .tier-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    width: 30px;
    flex-shrink: 0;
    color: var(--text-muted);
  }

  .tier-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--surface3);
    border-radius: 3px;
    overflow: hidden;
  }

  .tier-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  .tier-count {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    width: 20px;
    text-align: right;
  }

  .top-artists { margin-top: 4px; display: flex; flex-direction: column; gap: 6px; }

  .artist-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 10px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .artist-name { font-size: 12px; font-weight: 500; }
  .artist-count {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
  }

  /* ── FAVORITES VIEW ── */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    margin-bottom: 12px;
    color: var(--text-dim);
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.6;
  }

  .empty-state .big { font-size: 32px; margin-bottom: 8px; }

  /* ── CROWN SECTION ── */
  .crown-section {
    margin-bottom: 24px;
  }

  .crown-card {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--gold);
    box-shadow: 0 0 30px rgba(245,200,66,0.15);
  }

  .crown-banner {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: linear-gradient(90deg, rgba(245,200,66,0.15), transparent);
    border-bottom: 1px solid rgba(245,200,66,0.2);
  }

  .crown-banner span {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 2px;
    font-size: 13px;
    color: var(--gold);
  }

  .crown-content {
    display: flex;
    gap: 14px;
    padding: 14px;
    align-items: center;
  }

  .crown-cover {
    width: 80px;
    height: 80px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .crown-cover-placeholder {
    width: 80px;
    height: 80px;
    border-radius: 10px;
    background: var(--surface3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    flex-shrink: 0;
  }

  .crown-info { flex: 1; }
  .crown-album-title { font-size: 16px; font-weight: 700; line-height: 1.2; }
  .crown-artist { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .crown-rating { font-family: 'Bebas Neue', sans-serif; font-size: 32px; margin-top: 4px; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    width: 100%;
    background: var(--surface);
    border-radius: 22px 22px 0 0;
    border-top: 1px solid var(--border);
    padding: 0 0 env(safe-area-inset-bottom, 20px);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-height: 92vh;
    overflow-y: auto;
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 10px auto 0;
  }

  .modal-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px;
  }

  .modal-cover {
    width: 90px;
    height: 90px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .modal-cover-placeholder {
    width: 90px;
    height: 90px;
    border-radius: 10px;
    background: var(--surface3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    flex-shrink: 0;
  }

  .modal-info { flex: 1; }
  .modal-album { font-size: 17px; font-weight: 700; line-height: 1.2; }
  .modal-artist { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
  .modal-rating { font-family: 'Bebas Neue', sans-serif; font-size: 36px; margin-top: 6px; letter-spacing: 1px; }
  .modal-genre { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--text-muted); margin-top: 4px; }
  .modal-ten-emoji { font-size: 22px; margin-top: 4px; }

  .modal-actions {
    display: flex;
    gap: 8px;
    padding: 0 18px 12px;
    flex-wrap: wrap;
  }

  .action-btn {
    flex: 1;
    min-width: 100px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .action-btn:active { transform: scale(0.96); }
  .action-btn.crown-btn { border-color: var(--gold); color: var(--gold); }
  .action-btn.fav-btn { border-color: var(--fav); color: var(--fav); }
  .action-btn.danger { border-color: #555; color: #aaa; }

  .modal-divider {
    height: 1px;
    background: var(--border);
    margin: 0 18px 14px;
  }

  /* ── ADD MODAL ── */
  .add-form { padding: 14px 18px; }

  .form-group { margin-bottom: 14px; }

  .form-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }

  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  .form-input:focus { border-color: #555; }

  .search-results {
    margin-top: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: none;
  }

  .search-result-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:active { background: var(--surface3); }

  .sr-thumb {
    width: 40px;
    height: 40px;
    border-radius: 6px;
    object-fit: cover;
    background: var(--surface3);
    flex-shrink: 0;
  }

  .sr-info { flex: 1; min-width: 0; }
  .sr-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sr-artist { font-size: 11px; color: var(--text-muted); }

  .rating-picker {
    display: grid;
    grid-template-columns: repeat(11, 1fr);
    gap: 4px;
  }

  .rating-pick {
    aspect-ratio: 1;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
  }

  .rating-pick.selected {
    color: #fff;
    border-color: transparent;
    transform: scale(1.1);
  }

  .emoji-input {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .emoji-input .form-input { flex: 1; }

  .submit-btn {
    width: 100%;
    padding: 14px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.15s;
  }

  .submit-btn:active { opacity: 0.8; }

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
    right: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #fff;
    border: none;
    color: #000;
    font-size: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 90;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: transform 0.15s;
  }

  .fab:active { transform: scale(0.92); }

  /* ── RATING COLOR HELPERS ── */
  .r0,.r1,.r2,.r3 { color: #c87a35; }
  .r4,.r5,.r6 { color: #22a0a0; }
  .r7,.r8,.r9 { color: #9066e0; }
  .r10 { color: var(--c10); }

  .rb0,.rb1,.rb2,.rb3 { background: #7a4f2e; }

// ── DEEZER JSONP ── works everywhere, zero CORS issues
function deezerJSONP(url) {
  return new Promise((resolve) => {
    const cb = 'dz_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const fullUrl = url + (url.includes('?') ? '&' : '?') + `output=jsonp&callback=${cb}`;
    script.src = fullUrl;
    window[cb] = (data) => {
      delete window[cb];
      if (document.body.contains(script)) document.body.removeChild(script);
      resolve(data || {});
    };
    script.onerror = () => {
      delete window[cb];
      if (document.body.contains(script)) document.body.removeChild(script);
      resolve({});
    };
    setTimeout(() => { if (window[cb]) window[cb]({}); }, 6000);
    document.body.appendChild(script);
  });
}

async function deezerSearch(query) {
  const data = await deezerJSONP(`https://api.deezer.com/search/album?q=${encodeURIComponent(query)}&limit=8`);
  return data.data || [];
}

async function deezerFetchCover(title, artist) {
  const results = await deezerSearch(`${title} ${artist}`);
  if (results.length > 0) {
    const r = results[0];
    return {
      cover: r.cover_big || r.cover_medium || r.cover || '',
      genre: r.genre_id ? '' : ''
    };
  }
  return { cover: '', genre: '' };
}

  if (albums.length === 0) {
    const now = Date.now();
    // create all albums first so they show up instantly with placeholders
    albums = seedAlbums.map((a, i) => ({
      id: now - (seedAlbums.length - i) * 1000,
      title: a.title,
      artist: a.artist,
      rating: a.rating,
      emoji: a.emoji,
      notes: a.notes,
      cover: '',
      genre: '',
      fav: false,
      dateAdded: now - (seedAlbums.length - i) * 1000
    }));
    save();
    renderAll();
    // fetch covers one by one via Deezer JSONP
    for (let i = 0; i < albums.length; i++) {
      const info = await deezerFetchCover(albums[i].title, albums[i].artist);
      albums[i].cover = info.cover;
      albums[i].genre = info.genre;
      if (i % 4 === 0) { save(); renderAll(); }
    }
    save();
    renderAll();
  }
}

// ── RATING COLOR ──
function ratingColor(r) {
  if (r <= 3) return '#c87a35';
  if (r <= 6) return '#22a0a0';
  if (r <= 9) return '#9066e0';
  return 'var(--c10)';
}

function ratingBg(r) {
  if (r <= 3) return '#7a4f2e';
  if (r <= 6) return '#1a6b6b';
  if (r <= 9) return '#5b3fa8';
  return 'var(--c10)';
}

// ── SORT ──
function getSorted(arr, sort) {
  const a = [...arr];
  if (sort === 'date') return a.sort((x,y) => y.dateAdded - x.dateAdded);
  if (sort === 'rating-desc') return a.sort((x,y) => y.rating - x.rating || y.dateAdded - x.dateAdded);
  if (sort === 'rating-asc') return a.sort((x,y) => x.rating - y.rating || y.dateAdded - x.dateAdded);
  if (sort === 'alpha') return a.sort((x,y) => x.title.localeCompare(y.title));
  return a;
}

// ── RENDER STATS ──
function renderStats() {
  const grid = document.getElementById('statsGrid');
  if (albums.length === 0) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No albums logged yet.</div>'; return; }

  const avg = (albums.reduce((s,a) => s+a.rating, 0) / albums.length).toFixed(1);
  const top = [...albums].sort((a,b) => b.rating - a.rating)[0];
  const tens = albums.filter(a => a.rating === 10);

  const tierCounts = {};
  ['0-3','4-6','7-9','10'].forEach(k => tierCounts[k] = 0);
  albums.forEach(a => {
    if (a.rating <= 3) tierCounts['0-3']++;
    else if (a.rating <= 6) tierCounts['4-6']++;
    else if (a.rating <= 9) tierCounts['7-9']++;
    else tierCounts['10']++;
  });

  const artistCount = {};
  albums.forEach(a => { artistCount[a.artist] = (artistCount[a.artist]||0)+1; });
  const topArtists = Object.entries(artistCount).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const tierColors = { '0-3':'#c87a35','4-6':'#22a0a0','7-9':'#9066e0','10':'var(--c10)' };

  grid.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Logged</div>
      <div class="stat-value">${albums.length}</div>
      <div class="stat-sub">${(albums.length/365*100).toFixed(1)}% of 365</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Rating</div>
      <div class="stat-value" style="color:${ratingColor(Math.round(parseFloat(avg)))}">${avg}</div>
      <div class="stat-sub">out of 10</div>
    </div>
    <div class="stat-card wide">
      <div class="stat-label">Tier Breakdown</div>
      <div class="tier-bars">
        ${Object.entries(tierCounts).map(([k,v]) => `
          <div class="tier-row">
            <div class="tier-label">${k}</div>
            <div class="tier-bar-wrap">
              <div class="tier-bar-fill" style="width:${albums.length ? v/albums.length*100 : 0}%;background:${tierColors[k]}"></div>
            </div>
            <div class="tier-count">${v}</div>
          </div>`).join('')}
      </div>
    </div>
    ${tens.length > 0 ? `
    <div class="stat-card wide">
      <div class="stat-label">Masterpieces 🎖</div>
      <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;">
        ${tens.map(a => `
          <div style="display:flex;align-items:center;gap:8px;background:rgba(224,64,200,0.1);border:1px solid rgba(224,64,200,0.3);border-radius:10px;padding:7px 10px;flex:1;min-width:140px;cursor:pointer;" onclick="openDetail(${a.id})">
            ${a.cover ? `<img src="${a.cover}" style="width:36px;height:36px;border-radius:5px;object-fit:cover;" alt="">` : '<div style="width:36px;height:36px;border-radius:5px;background:var(--surface3);display:flex;align-items:center;justify-content:center;">🎵</div>'}
            <div>
              <div style="font-size:11px;font-weight:600;">${a.title} ${a.emoji}</div>
              <div style="font-size:10px;color:var(--text-muted);">${a.artist}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>` : ''}
    <div class="stat-card wide">
      <div class="stat-label">Most Listened Artists</div>
      <div class="top-artists">
        ${topArtists.map(([name,count]) => `
          <div class="artist-row">
            <div class="artist-name">${name}</div>
            <div class="artist-count">${count} album${count>1?'s':''}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

// ── RENDER ALL ──
function renderAll() {
  updateProgress();
  if (currentTab === 'wall') renderWall();
  else if (currentTab === 'list') renderList();
  else if (currentTab === 'favs') renderFavs();
  else renderStats();
}

function updateProgress() {
  const n = albums.length;
  document.getElementById('progressCount').textContent = n;
  const pct = n / 365;
  const circ = 81.7;
  document.getElementById('ringFill').style.strokeDashoffset = circ - pct * circ;
}

// ── TABS ──
function switchTab(tab) {
  currentTab = tab;
  ['wall','list','favs','stats'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === tab ? '' : 'none';
  });
  document.querySelectorAll('.nav-tab').forEach((btn, i) => {
    btn.classList.toggle('active', ['wall','list','favs','stats'][i] === tab);
  });
  renderAll();
}

// ── SORT BUTTONS ──
function setSort(s, btn) {
  currentSort = s;
  document.querySelectorAll('#tab-wall .tool-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderWall();
}

function setListSort(s, btn) {
  currentListSort = s;
  document.querySelectorAll('#tab-list .tool-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

// ── DETAIL MODAL ──
function openDetail(id) {
  const al = albums.find(a => a.id === id);
  if (!al) return;
  detailAlbumId = id;

  const isTen = al.rating === 10;
  const isCrown = al.id === crownId;

  document.getElementById('detailHeader').innerHTML = `
    ${al.cover
      ? `<img class="modal-cover" src="${al.cover}" alt="">`
      : `<div class="modal-cover-placeholder">🎵</div>`}
    <div class="modal-info">
      <div class="modal-album">${al.title}</div>
      <div class="modal-artist">${al.artist}</div>
      <div class="modal-rating" style="color:${ratingColor(al.rating)}">${al.rating}/10</div>
      ${al.genre ? `<div class="modal-genre">${al.genre}</div>` : ''}
      ${isTen && al.emoji ? `<div class="modal-ten-emoji">${al.emoji}</div>` : ''}
      ${al.notes ? `<div style="font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;">${al.notes}</div>` : ''}
    </div>`;

  document.getElementById('detailActions').innerHTML = `
    <button class="action-btn fav-btn" onclick="toggleFav(${id})">
      ${al.fav ? '♥ Unfavourite' : '♡ Favourite'}
    </button>
    <button class="action-btn crown-btn" onclick="setCrown(${id})">
      ${isCrown ? '👑 Uncrown' : '👑 Crown This'}
    </button>
    <button class="action-btn danger" onclick="confirmDelete(${id})">🗑 Remove</button>`;

  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetailIfBg(e) {
  if (e.target === document.getElementById('detailOverlay')) closeDetail();
}
function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  detailAlbumId = null;
}

function toggleFav(id) {
  const al = albums.find(a => a.id === id);
  if (!al) return;
  al.fav = !al.fav;
  save();
  closeDetail();
  renderAll();
}

function setCrown(id) {
  crownId = crownId === id ? null : id;
  save();
  closeDetail();
  renderAll();
}

function confirmDelete(id) {
  document.getElementById('detailActions').innerHTML = `
    <div style="width:100%;text-align:center;padding:4px 0;">
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:10px;">Remove this album?</div>
      <div style="display:flex;gap:8px;">
        <button class="action-btn" onclick="openDetail(${id})" style="flex:1;">Cancel</button>
        <button class="action-btn danger" onclick="deleteAlbum(${id})" style="flex:1;background:#2a1a1a;border-color:#c84040;color:#ff6060;">Yes, remove</button>
      </div>
    </div>`;
}

function deleteAlbum(id) {
  albums = albums.filter(a => a.id !== id);
  if (crownId === id) crownId = null;
  save();
  closeDetail();
  renderAll();
}

// ── ADD MODAL ──
function showManual() {
  document.getElementById('searchResults').style.display = 'none';
  const mg = document.getElementById('manualGroup');
  mg.style.display = 'flex';
}

function openAddModal() {
  selectedAlbumData = null;
  selectedRating = null;
  document.getElementById('searchInput').value = '';
  document.getElementById('manualTitle').value = '';
  document.getElementById('manualArtist').value = '';
  document.getElementById('emojiInput').value = '';
  document.getElementById('notesInput').value = '';
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('selectedPreview').style.display = 'none';
  document.getElementById('manualGroup').style.display = 'none';
  buildRatingPicker();
  document.getElementById('addOverlay').classList.add('open');
}

function closeAddIfBg(e) {
  if (e.target === document.getElementById('addOverlay')) closeAdd();
}
function closeAdd() {
  document.getElementById('addOverlay').classList.remove('open');
}

function buildRatingPicker() {
  const picker = document.getElementById('ratingPicker');
  picker.innerHTML = Array.from({length:11},(_,i) => `
    <div class="rating-pick ${selectedRating===i?'selected rb'+i:''}"
         style="${selectedRating===i?'background:'+ratingBg(i)+';color:#fff;border-color:transparent':''}"
         onclick="pickRating(${i})">${i}</div>
  `).join('');
}

function pickRating(n) {
  selectedRating = n;
  buildRatingPicker();
}

let searchController = null;
function handleSearch() {
  clearTimeout(searchTimeout);
  const q = document.getElementById('searchInput').value.trim();
  if (q.length < 2) { document.getElementById('searchResults').style.display = 'none'; return; }
  searchTimeout = setTimeout(() => doSearch(q), 400);
}

async function doSearch(q) {
  const resultsEl = document.getElementById('searchResults');
  resultsEl.style.display = 'block';
  resultsEl.innerHTML = `<div style="padding:10px 12px;color:var(--text-muted);font-size:12px;display:flex;align-items:center;gap:8px;"><span class="spinner"></span> Searching...</div>`;

  const results = await deezerSearch(q);

  if (!results.length) {
    resultsEl.innerHTML = `<div style="padding:10px 12px;color:var(--text-muted);font-size:12px;">No results — <span style="color:#fff;cursor:pointer;" onclick="showManual()">enter manually →</span></div>`;
    return;
  }

  resultsEl.innerHTML = results.slice(0, 6).map((r, i) => {
    const img = r.cover_medium || r.cover || '';
    const title = r.title || '';
    const artist = r.artist?.name || '';
    return `<div class="search-result-item" onclick="selectResult(${i})">
      ${img ? `<img class="sr-thumb" src="${img}" alt="">` : `<div class="sr-thumb" style="display:flex;align-items:center;justify-content:center;font-size:16px;">🎵</div>`}
      <div class="sr-info">
        <div class="sr-title">${title}</div>
        <div class="sr-artist">${artist}</div>
      </div>
    </div>`;
  }).join('') + `<div class="search-result-item" onclick="showManual()" style="justify-content:center;color:var(--text-muted);font-size:11px;">Can't find it? Enter manually →</div>`;

  window._searchResults = results;
}

function selectResult(i) {
  const r = window._searchResults[i];
  const img = r.cover_big || r.cover_medium || r.cover || '';
  const title = r.title || r.collectionName || '';
  const artist = r.artist?.name || r.artistName || '';

  selectedAlbumData = { title, artist, cover: img, genre: '' };

  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('searchInput').value = '';

  const preview = document.getElementById('selectedPreview');
  preview.style.display = 'flex';
  document.getElementById('previewTitle').textContent = title;
  document.getElementById('previewArtist').textContent = artist;
  const previewImg = document.getElementById('previewImg');
  if (img) { previewImg.src = img; previewImg.style.display = 'block'; }
  else previewImg.style.display = 'none';
}

function clearSelection() {
  selectedAlbumData = null;
  document.getElementById('selectedPreview').style.display = 'none';
  document.getElementById('previewImg').style.display = 'block';
}

async function submitAlbum() {
  if (selectedRating === null) { alert('Pick a rating first'); return; }

  let title, artist, cover, genre = '';

  if (selectedAlbumData) {
    title = selectedAlbumData.title;
    artist = selectedAlbumData.artist;
    cover = selectedAlbumData.cover;
    genre = selectedAlbumData.genre || '';
    if (!cover) {
      const info = await fetchCover(title, artist);
      cover = info.cover;
      genre = genre || info.genre;
    }
  } else {
    title = document.getElementById('manualTitle').value.trim();
    artist = document.getElementById('manualArtist').value.trim();
    if (!title || !artist) { alert('Enter album title and artist'); return; }
    const info = await deezerFetchCover(title, artist);
    cover = info.cover;
    genre = info.genre;
  }

  const emoji = document.getElementById('emojiInput').value.trim();
  const notes = document.getElementById('notesInput').value.trim();

  const album = {
    id: Date.now(),
    title, artist, rating: selectedRating,
    emoji: selectedRating === 10 ? emoji : '',
    notes, cover, genre,
    fav: false,
    dateAdded: Date.now()
  };

  albums.push(album);
  save();
  closeAdd();
  renderAll();

  // switch to wall to see it
  switchTab('wall');
}

// ── INIT ──
load();
renderAll();
if (albums.length === 0) {
  initSeed();
} else {
  updateProgress();
  const missing = albums.filter(a => !a.cover);
  if (missing.length > 0) {
    (async () => {
      for (let i = 0; i < albums.length; i++) {
        if (!albums[i].cover) {
          const info = await deezerFetchCover(albums[i].title, albums[i].artist);
          albums[i].cover = info.cover;
          if (!albums[i].genre && info.genre) albums[i].genre = info.genre;
          if (i % 4 === 0) { save(); renderAll(); }
        }
      }
      save(); renderAll();
    })();
  }
}
</script>
</body>
