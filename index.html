<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>365 Albums</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --surface3: #222222;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --text-muted: #666;
    --text-dim: #999;
    --c10: #e040c8;
    --gold: #f5c842;
    --fav: #e05050;
    --spotify: #1DB954;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* LOGIN */
  .login-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999; background: var(--bg);
    gap: 20px; padding: 40px; text-align: center;
  }

  .login-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px; letter-spacing: 6px;
    background: linear-gradient(135deg, #fff 0%, #666 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1;
  }

  .login-year {
    font-family: 'Space Mono', monospace;
    font-size: 11px; color: var(--text-muted); letter-spacing: 3px;
  }

  .login-desc { font-size: 13px; color: var(--text-dim); max-width: 240px; line-height: 1.7; }

  .spotify-btn {
    display: flex; align-items: center; gap: 10px;
    background: var(--spotify); color: #000;
    font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px;
    padding: 14px 28px; border-radius: 999px; border: none;
    cursor: pointer; transition: transform 0.15s, opacity 0.15s;
    margin-top: 8px;
  }
  .spotify-btn:active { transform: scale(0.96); opacity: 0.9; }
  .spotify-btn svg { width: 22px; height: 22px; }

  /* HEADER */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: env(safe-area-inset-top, 0) 0 0;
  }

  .header-inner {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 14px 18px; gap: 12px;
  }

  .header-left h1 {
    font-family: 'Bebas Neue', sans-serif; font-size: 28px;
    letter-spacing: 2px; line-height: 1;
    background: linear-gradient(135deg, #fff 0%, #aaa 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .header-left .sub {
    font-family: 'Space Mono', monospace; font-size: 10px;
    color: var(--text-muted); letter-spacing: 1px; margin-top: 2px;
  }

  .progress-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 999px; padding: 6px 12px; flex-shrink: 0;
  }

  .progress-pill .count {
    font-family: 'Bebas Neue', sans-serif; font-size: 18px;
    letter-spacing: 1px; color: #fff; line-height: 1;
  }

  .progress-pill .total {
    font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-muted);
  }

  .progress-ring-wrap { width: 32px; height: 32px; }
  .progress-ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 3; }
  .ring-fill { fill: none; stroke: var(--c10); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }

  /* NAV */
  .nav-tabs { display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
  .nav-tabs::-webkit-scrollbar { display: none; }

  .nav-tab {
    flex: 1; min-width: 70px; padding: 10px 6px;
    background: none; border: none; color: var(--text-muted);
    font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
    letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s;
    position: relative; white-space: nowrap;
  }
  .nav-tab.active { color: #fff; }
  .nav-tab.active::after {
    content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
    height: 2px; background: var(--c10); border-radius: 2px 2px 0 0;
  }

  /* MAIN */
  .main { padding: 16px 14px; padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 100px); position: relative; z-index: 1; }

  /* TOOLBAR */
  .toolbar { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
  .toolbar::-webkit-scrollbar { display: none; }

  .tool-btn {
    flex-shrink: 0; padding: 6px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 999px; color: var(--text-dim);
    font-family: 'DM Sans', sans-serif; font-size: 12px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .tool-btn.active { background: var(--surface3); border-color: #555; color: #fff; }

  /* GRID */
  .album-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

  .album-card {
    position: relative; border-radius: 10px; overflow: hidden;
    aspect-ratio: 1; cursor: pointer; background: var(--surface2);
    transition: transform 0.15s ease;
  }
  .album-card:active { transform: scale(0.96); }
  .album-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .cover-placeholder {
    width: 100%; height: 100%; display: flex; align-items: center;
    justify-content: center; flex-direction: column; gap: 4px;
    background: var(--surface3); padding: 8px; text-align: center;
  }
  .ph-title { font-size: 9px; font-weight: 700; color: var(--text-dim); line-height: 1.2; word-break: break-word; }
  .ph-artist { font-size: 8px; color: var(--text-muted); }

  .rating-badge {
    position: absolute; bottom: 5px; left: 5px;
    font-family: 'Bebas Neue', sans-serif; font-size: 14px;
    padding: 2px 6px; border-radius: 5px; line-height: 1;
    letter-spacing: 0.5px; z-index: 2;
  }

  .album-card::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
    pointer-events: none; z-index: 1;
  }

  .crown-badge { position: absolute; top: 4px; right: 4px; font-size: 16px; z-index: 3; filter: drop-shadow(0 0 4px rgba(245,200,66,0.8)); }
  .fav-badge { position: absolute; top: 4px; left: 4px; font-size: 13px; z-index: 3; }

  .album-card.is-ten {
    box-shadow: 0 0 0 2.5px var(--c10), 0 0 18px rgba(224,64,200,0.55), 0 0 36px rgba(224,64,200,0.2);
    animation: fadeUp 0.3s ease both, tenPulse 3s ease-in-out infinite;
  }

  @keyframes tenPulse {
    0%,100% { box-shadow: 0 0 0 2.5px var(--c10), 0 0 18px rgba(224,64,200,0.55), 0 0 36px rgba(224,64,200,0.2); }
    50% { box-shadow: 0 0 0 3px var(--c10), 0 0 30px rgba(224,64,200,0.8), 0 0 55px rgba(224,64,200,0.4); }
  }

  .album-card.is-ten .rating-badge {
    background: var(--c10) !important;
    box-shadow: 0 0 8px rgba(224,64,200,0.8);
  }

  /* LIST */
  .album-list { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px; cursor: pointer; transition: all 0.15s;
  }
  .list-item:active { transform: scale(0.98); }
  .list-item.is-ten { border-color: var(--c10); box-shadow: 0 0 12px rgba(224,64,200,0.2); }

  .list-thumb { width: 52px; height: 52px; border-radius: 7px; object-fit: cover; flex-shrink: 0; background: var(--surface3); }
  .list-thumb-placeholder { width: 52px; height: 52px; border-radius: 7px; background: var(--surface3); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; }

  .list-info { flex: 1; min-width: 0; }
  .list-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-artist { font-size: 11px; color: var(--text-muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-meta { display: flex; align-items: center; gap: 4px; margin-top: 4px; }

  .genre-tag { font-size: 9px; background: var(--surface3); border: 1px solid var(--border); color: var(--text-muted); padding: 2px 6px; border-radius: 999px; font-family: 'Space Mono', monospace; }

  .list-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .list-rating { font-family: 'Bebas Neue', sans-serif; font-size: 20px; line-height: 1; }
  .list-icons { font-size: 12px; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
  .stat-card.wide { grid-column: 1 / -1; }
  .stat-label { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 36px; line-height: 1; color: #fff; }
  .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .tier-bars { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
  .tier-row { display: flex; align-items: center; gap: 8px; }
  .tier-label { font-family: 'Space Mono', monospace; font-size: 9px; width: 30px; flex-shrink: 0; color: var(--text-muted); }
  .tier-bar-wrap { flex: 1; height: 6px; background: var(--surface3); border-radius: 3px; overflow: hidden; }
  .tier-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .tier-count { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-muted); width: 20px; text-align: right; }

  .top-artists { margin-top: 4px; display: flex; flex-direction: column; gap: 6px; }
  .artist-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); }
  .artist-name { font-size: 12px; font-weight: 500; }
  .artist-count { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-muted); }

  /* CROWN / FAVS */
  .crown-section { margin-bottom: 24px; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; margin-bottom: 12px; color: var(--text-dim); }

  .crown-card { position: relative; border-radius: 16px; overflow: hidden; background: var(--surface); border: 1px solid var(--gold); box-shadow: 0 0 30px rgba(245,200,66,0.15); cursor: pointer; }
  .crown-banner { display: flex; align-items: center; gap: 6px; padding: 8px 14px; background: linear-gradient(90deg, rgba(245,200,66,0.15), transparent); border-bottom: 1px solid rgba(245,200,66,0.2); }
  .crown-banner span { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; font-size: 13px; color: var(--gold); }
  .crown-content { display: flex; gap: 14px; padding: 14px; align-items: center; }
  .crown-cover { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
  .crown-cover-placeholder { width: 80px; height: 80px; border-radius: 10px; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 30px; flex-shrink: 0; }
  .crown-info { flex: 1; }
  .crown-album-title { font-size: 16px; font-weight: 700; line-height: 1.2; }
  .crown-artist { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .crown-rating { font-family: 'Bebas Neue', sans-serif; font-size: 32px; margin-top: 4px; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; line-height: 1.6; grid-column: 1/-1; }
  .empty-state .big { font-size: 32px; margin-bottom: 8px; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    z-index: 200; display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    width: 100%; background: var(--surface);
    border-radius: 22px 22px 0 0; border-top: 1px solid var(--border);
    padding: 0 0 env(safe-area-inset-bottom, 20px);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-height: 92vh; overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
  .modal-header { display: flex; align-items: flex-start; gap: 14px; padding: 16px 18px; }
  .modal-cover { width: 90px; height: 90px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
  .modal-cover-placeholder { width: 90px; height: 90px; border-radius: 10px; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 36px; flex-shrink: 0; }
  .modal-info { flex: 1; }
  .modal-album { font-size: 17px; font-weight: 700; line-height: 1.2; }
  .modal-artist { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
  .modal-rating { font-family: 'Bebas Neue', sans-serif; font-size: 36px; margin-top: 6px; letter-spacing: 1px; }
  .modal-genre { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--text-muted); margin-top: 4px; }
  .modal-actions { display: flex; gap: 8px; padding: 0 18px 12px; flex-wrap: wrap; }
  .modal-divider { height: 1px; background: var(--border); margin: 0 18px 14px; }

  .action-btn {
    flex: 1; min-width: 100px; padding: 10px 14px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .action-btn:active { transform: scale(0.96); }
  .action-btn.crown-btn { border-color: var(--gold); color: var(--gold); }
  .action-btn.fav-btn { border-color: var(--fav); color: var(--fav); }
  .action-btn.danger { border-color: #c84040; color: #ff6060; background: #2a1a1a; }

  /* ADD FORM */
  .add-form { padding: 14px 18px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; display: block; }

  .form-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
    transition: border-color 0.15s; -webkit-appearance: none;
  }
  .form-input:focus { border-color: #555; }

  .search-results { margin-top: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: none; }

  .search-result-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s;
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:active { background: var(--surface3); }

  .sr-thumb { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; background: var(--surface3); flex-shrink: 0; }
  .sr-info { flex: 1; min-width: 0; }
  .sr-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sr-artist { font-size: 11px; color: var(--text-muted); }

  .rating-picker { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
  .rating-pick {
    aspect-ratio: 1; border-radius: 7px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text-muted);
    font-family: 'Bebas Neue', sans-serif; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.1s;
  }
  .rating-pick.selected { color: #fff; border-color: transparent; transform: scale(1.1); }

  .submit-btn {
    width: 100%; padding: 14px; background: #fff; color: #000; border: none;
    border-radius: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 18px;
    letter-spacing: 2px; cursor: pointer; margin-top: 4px; transition: opacity 0.15s;
  }
  .submit-btn:active { opacity: 0.8; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .selected-cover-preview { display: none; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 14px; }
  .selected-cover-preview img { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; }
  .scp-info { flex: 1; }
  .scp-title { font-size: 13px; font-weight: 600; }
  .scp-artist { font-size: 11px; color: var(--text-muted); }
  .scp-clear { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 4px; }

  /* FAB */
  .fab {
    position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 24px); right: 20px;
    width: 56px; height: 56px; border-radius: 50%; background: #fff; border: none;
    color: #000; font-size: 26px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 90; box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: transform 0.15s;
  }
  .fab:active { transform: scale(0.92); }

  /* MISC */
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--text-dim); border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .album-card, .list-item { animation: fadeUp 0.3s ease both; }

  .fetch-banner { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-muted); text-align: center; padding: 8px; letter-spacing: 0.5px; display: none; }

  .cover-upload-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 10px 14px; background: var(--surface2);
    border: 1px dashed #444; border-radius: 10px; color: var(--text-dim);
    font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer;
    transition: border-color 0.15s, color 0.15s; margin-top: 6px;
  }
  .cover-upload-btn:active { border-color: #888; color: #fff; }

  .edit-section { padding: 0 18px 16px; }
  .edit-section-title { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-title">365<br>ALBUMS</div>
  <div class="login-year">2026 LISTENING LOG</div>
  <div class="login-desc">Connect Spotify once to pull album covers and search music.</div>
  <button class="spotify-btn" onclick="spotifyLogin()">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
    Connect Spotify
  </button>
</div>

<!-- APP -->
<div id="appShell" style="display:none">

  <div class="header">
    <div class="header-inner">
      <div class="header-left">
        <h1>365 ALBUMS</h1>
        <div class="sub">2026 LISTENING LOG</div>
      </div>
      <div class="progress-pill">
        <div>
          <div class="count" id="progressCount">0</div>

// ── SPOTIFY PKCE ──
async function sha256(plain) {
  return crypto.subtle.digest('SHA-256', new TextEncoder().encode(plain));
}

function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function spotifyLogin() {
  const verifier = b64url(crypto.getRandomValues(new Uint8Array(32)));
  const challenge = b64url(await sha256(verifier));
  localStorage.setItem('pkce_v', verifier);
  const p = new URLSearchParams({ client_id: CLIENT_ID, response_type: 'code', redirect_uri: REDIRECT_URI, scope: SCOPES, code_challenge_method: 'S256', code_challenge: challenge });
  window.location = 'https://accounts.spotify.com/authorize?' + p;
}

async function exchangeCode(code) {
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ client_id: CLIENT_ID, grant_type: 'authorization_code', code, redirect_uri: REDIRECT_URI, code_verifier: localStorage.getItem('pkce_v') }),
  });
  const d = await res.json();
  if (d.access_token) {
    localStorage.setItem(TOKEN_KEY, JSON.stringify({ token: d.access_token, expiry: Date.now() + d.expires_in * 1000 }));
    localStorage.removeItem('pkce_v');
    return d.access_token;
  }
  return null;
}

function getStoredToken() {
  try {
    const { token, expiry } = JSON.parse(localStorage.getItem(TOKEN_KEY) || '{}');
    return Date.now() < expiry ? token : null;
  } catch(e) { return null; }
}

// ── SPOTIFY API ──
async function spotifySearch(q) {
  if (!spotifyToken) return [];
  try {
    const res = await fetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(q)}&type=album&limit=8`, { headers: { Authorization: `Bearer ${spotifyToken}` } });
    if (res.status === 401) { localStorage.removeItem(TOKEN_KEY); spotifyToken = null; return []; }
    const d = await res.json();
    return d?.albums?.items || [];
  } catch(e) { return []; }
}

async function spotifyFetchCover(title, artist) {
  let results = await spotifySearch(`album:${title} artist:${artist}`);
  if (!results.length) results = await spotifySearch(`${title} ${artist}`);
  if (!results.length) results = await spotifySearch(title);
  if (!results.length) return { cover: '', genre: '' };
  const album = results[0];
  const img = album?.images?.[0]?.url || '';
  // fetch genre from artist
  let genre = '';
  const artistId = album?.artists?.[0]?.id;
  if (artistId && spotifyToken) {
    try {
      const ar = await fetch(`https://api.spotify.com/v1/artists/${artistId}`, { headers: { Authorization: `Bearer ${spotifyToken}` } });
      const ad = await ar.json();
      genre = ad?.genres?.[0] || '';
    } catch(e) {}
  }
  return { cover: img, genre };
}

  if (r <= 6) return '#22a0a0';
  if (r <= 9) return '#9066e0';
  return 'var(--c10)';
}
function ratingBg(r) {
  if (r <= 3) return '#7a4f2e';
  if (r <= 6) return '#1a6b6b';
  if (r <= 9) return '#5b3fa8';
  return 'var(--c10)';
}

// ── SORT ──
function getSorted(arr, sort) {
  const a = [...arr];
  if (sort === 'date') return a.sort((x,y) => y.dateAdded - x.dateAdded);
  if (sort === 'rating-desc') return a.sort((x,y) => y.rating - x.rating || y.dateAdded - x.dateAdded);
  if (sort === 'rating-asc') return a.sort((x,y) => x.rating - y.rating || y.dateAdded - x.dateAdded);
  if (sort === 'alpha') return a.sort((x,y) => x.title.localeCompare(y.title));
  return a;
}

    ${tens.length?`<div class="stat-card wide"><div class="stat-label">Masterpieces</div><div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;">
      ${tens.map(a=>`<div style="display:flex;align-items:center;gap:8px;background:rgba(224,64,200,0.1);border:1px solid rgba(224,64,200,0.3);border-radius:10px;padding:7px 10px;flex:1;min-width:140px;cursor:pointer;" onclick="openDetail(${a.id})">
        ${a.cover?`<img src="${a.cover}" style="width:36px;height:36px;border-radius:5px;object-fit:cover;box-shadow:0 0 8px rgba(224,64,200,0.4);" alt="">`:'<div style="width:36px;height:36px;border-radius:5px;background:var(--surface3);display:flex;align-items:center;justify-content:center;">🎵</div>'}
        <div><div style="font-size:11px;font-weight:600;">${a.title}</div><div style="font-size:10px;color:var(--text-muted)">${a.artist}</div></div>
      </div>`).join('')}
    </div></div>`:''}
    <div class="stat-card wide"><div class="stat-label">Most Listened Artists</div><div class="top-artists">
      ${topArtists.map(([n,c])=>`<div class="artist-row"><div class="artist-name">${n}</div><div class="artist-count">${c} album${c>1?'s':''}</div></div>`).join('')}
    </div></div>
    ${topGenres.length?`<div class="stat-card wide"><div class="stat-label">Genres</div><div class="tier-bars" style="margin-top:8px;">
      ${topGenres.map(([g,c])=>`<div class="tier-row"><div class="tier-label" style="width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${g}</div><div class="tier-bar-wrap"><div class="tier-bar-fill" style="width:${topGenres[0][1]?c/topGenres[0][1]*100:0}%;background:#5b3fa8;"></div></div><div class="tier-count">${c}</div></div>`).join('')}
    </div></div>`:''}`;
}

function renderAll() {
  document.getElementById('progressCount').textContent = albums.length;
  document.getElementById('ringFill').style.strokeDashoffset = 81.7 - (albums.length/365)*81.7;
  if (currentTab==='wall') renderWall();
  else if (currentTab==='list') renderList();
  else if (currentTab==='favs') renderFavs();
  else renderStats();
}

// ── TABS / SORT ──
function switchTab(tab) {
  currentTab = tab;
  ['wall','list','favs','stats'].forEach(t => document.getElementById('tab-'+t).style.display = t===tab?'':'none');
  document.querySelectorAll('.nav-tab').forEach((b,i) => b.classList.toggle('active', ['wall','list','favs','stats'][i]===tab));
  renderAll();
}

function setSort(s,btn) { currentSort=s; document.querySelectorAll('#tab-wall .tool-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderWall(); }
function setListSort(s,btn) { currentListSort=s; document.querySelectorAll('#tab-list .tool-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderList(); }

// ── DETAIL MODAL ──
function openDetail(id) {
  const al = albums.find(a=>a.id===id);
  if (!al) return;
  document.getElementById('detailHeader').innerHTML = `
    <div style="position:relative;flex-shrink:0;">
      ${al.cover?`<img class="modal-cover" src="${al.cover}" alt="">`:`<div class="modal-cover-placeholder">🎵</div>`}
      <label style="position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,0.7);border-radius:6px;padding:4px 6px;font-size:10px;color:#ccc;cursor:pointer;z-index:2;">
        ✎<input type="file" accept="image/*" style="display:none;" onchange="changeCover(${id}, this)">
      </label>
    </div>
    <div class="modal-info">
      <div class="modal-album">${al.title}</div>
      <div class="modal-artist">${al.artist}</div>
      <div class="modal-rating" style="color:${ratingColor(al.rating)}">${al.rating}/10</div>
      ${al.genre?`<div class="modal-genre">${al.genre}</div>`:''}
      ${al.notes?`<div style="font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;">${al.notes}</div>`:''}
    </div>`;
  document.getElementById('detailActions').innerHTML = `
    <button class="action-btn fav-btn" onclick="toggleFav(${id})">${al.fav?'♥ Unfavourite':'♡ Favourite'}</button>
    <button class="action-btn crown-btn" onclick="setCrown(${id})">${al.id===crownId?'👑 Uncrown':'👑 Crown This'}</button>
    <button class="action-btn" onclick="openEdit(${id})" style="border-color:#555;color:#ccc;">✏️ Edit</button>
    <button class="action-btn danger" onclick="confirmDelete(${id})">🗑 Remove</button>`;
  document.getElementById('editSection').style.display = 'none';
  document.getElementById('detailOverlay').classList.add('open');
}

function changeCover(id, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const al = albums.find(a=>a.id===id);
    if (!al) return;
    al.cover = e.target.result;
    save();
    renderAll();
    openDetail(id); // refresh modal
  };
  reader.readAsDataURL(file);
}

function closeDetailIfBg(e) { if (e.target===document.getElementById('detailOverlay')) closeDetail(); }
function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); }

function confirmDelete(id) {
  document.getElementById('detailActions').innerHTML = `
    <div style="width:100%;text-align:center;padding:4px 0;">
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:10px;">Remove this album?</div>
      <div style="display:flex;gap:8px;">
        <button class="action-btn" onclick="openDetail(${id})" style="flex:1">Cancel</button>
        <button class="action-btn danger" onclick="deleteAlbum(${id})" style="flex:1">Yes, remove</button>
      </div>
    </div>`;
}

function deleteAlbum(id) { albums=albums.filter(a=>a.id!==id); if(crownId===id) crownId=null; save(); closeDetail(); renderAll(); }
function toggleFav(id) { const al=albums.find(a=>a.id===id); if(!al) return; al.fav=!al.fav; save(); closeDetail(); renderAll(); }
function setCrown(id) { crownId=crownId===id?null:id; save(); closeDetail(); renderAll(); }

// ── EDIT ──
let editAlbumId = null;
let editNewCover = null;

function openEdit(id) {
  const al = albums.find(a => a.id === id);
  if (!al) return;
  editAlbumId = id;
  editNewCover = null;

  const picker = document.getElementById('editRatingPicker');
  picker.innerHTML = Array.from({length:11},(_,i)=>`
    <div class="rating-pick ${al.rating===i?'selected':''}"
         style="${al.rating===i?`background:${ratingBg(i)};color:#fff;border-color:transparent`:''}"
         onclick="pickEditRating(${i})">${i}</div>`).join('');

  document.getElementById('editSection').style.display = 'block';
  // scroll modal down to show edit section
  document.getElementById('editSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function pickEditRating(n) {
  editAlbumId && (albums.find(a=>a.id===editAlbumId)._pendingRating = n);
  const picker = document.getElementById('editRatingPicker');
  picker.querySelectorAll('.rating-pick').forEach((el,i) => {
    el.className = 'rating-pick' + (i===n?' selected':'');
    el.style.cssText = i===n ? `background:${ratingBg(i)};color:#fff;border-color:transparent` : '';
  });
}

function handleEditCoverUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => { editNewCover = ev.target.result; };
  reader.readAsDataURL(file);
}

function saveEdit() {
  const al = albums.find(a => a.id === editAlbumId);
  if (!al) return;
  if (al._pendingRating !== undefined) { al.rating = al._pendingRating; delete al._pendingRating; }
  if (editNewCover) al.cover = editNewCover;
  editAlbumId = null; editNewCover = null;
  save();
  closeDetail();
  renderAll();
}

// ── ADD MODAL ──
function openAddModal() {
  selectedAlbumData=null; selectedRating=null;
  ['searchInput','manualTitle','manualArtist','emojiInput','notesInput','manualGenre'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('searchResults').style.display='none';
  document.getElementById('selectedPreview').style.display='none';
  document.getElementById('manualGroup').style.display='none';
  document.getElementById('manualCoverPreview').style.display='none';
  manualCoverDataUrl = null;
  buildRatingPicker();
  document.getElementById('addOverlay').classList.add('open');
}

function closeAddIfBg(e) { if(e.target===document.getElementById('addOverlay')) closeAdd(); }
function closeAdd() { document.getElementById('addOverlay').classList.remove('open'); }

function buildRatingPicker() {
  document.getElementById('ratingPicker').innerHTML = Array.from({length:11},(_,i)=>`
    <div class="rating-pick ${selectedRating===i?'selected':''}" style="${selectedRating===i?`background:${ratingBg(i)};color:#fff;border-color:transparent`:''}" onclick="pickRating(${i})">${i}</div>`).join('');
}

function pickRating(n) { selectedRating=n; buildRatingPicker(); }

function handleSearch() {
  clearTimeout(searchTimeout);
  const q = document.getElementById('searchInput').value.trim();
  if (q.length < 2) { document.getElementById('searchResults').style.display='none'; return; }
  searchTimeout = setTimeout(() => doSearch(q), 400);
}

async function doSearch(q) {
  const el = document.getElementById('searchResults');
  el.style.display = 'block';
  el.innerHTML = `<div style="padding:10px 12px;color:var(--text-muted);font-size:12px;display:flex;align-items:center;gap:8px;"><span class="spinner"></span> Searching...</div>`;
  const results = await spotifySearch(q);
  if (!results.length) {
    el.innerHTML = `<div style="padding:10px 12px;color:var(--text-muted);font-size:12px;">No results — <span style="color:#fff;cursor:pointer;" onclick="showManual()">enter manually →</span></div>`;
    return;
  }
  window._sr = results;
  el.innerHTML = results.slice(0,6).map((r,i) => {
    const img = r.images?.[1]?.url || r.images?.[0]?.url || '';
    const artist = r.artists?.map(a=>a.name).join(', ') || '';
    return `<div class="search-result-item" onclick="selectResult(${i})">
      ${img?`<img class="sr-thumb" src="${img}" alt="">`:`<div class="sr-thumb" style="display:flex;align-items:center;justify-content:center;">🎵</div>`}
      <div class="sr-info"><div class="sr-title">${r.name}</div><div class="sr-artist">${artist}</div></div>
    </div>`;
  }).join('') + `<div class="search-result-item" onclick="showManual()" style="justify-content:center;color:var(--text-muted);font-size:11px;">Can't find it? Enter manually →</div>`;
}

function selectResult(i) {
  const r = window._sr[i];
  const img = r.images?.[0]?.url || '';
  const artist = r.artists?.map(a=>a.name).join(', ') || '';
  selectedAlbumData = { title: r.name, artist, cover: img, genre: '' };
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('searchInput').value = '';
  const prev = document.getElementById('selectedPreview');
  prev.style.display = 'flex';
  document.getElementById('previewTitle').textContent = r.name;
  document.getElementById('previewArtist').textContent = artist;
  const pi = document.getElementById('previewImg');
  pi.style.display = img ? 'block' : 'none';
  if (img) pi.src = img;
}

function showManual() { document.getElementById('searchResults').style.display='none'; document.getElementById('manualGroup').style.display='flex'; }
function clearSelection() { selectedAlbumData=null; document.getElementById('selectedPreview').style.display='none'; }

let manualCoverDataUrl = null;

function handleManualCoverUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    manualCoverDataUrl = ev.target.result;
    const preview = document.getElementById('manualCoverPreview');
    const img = document.getElementById('manualCoverImg');
    img.src = manualCoverDataUrl;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

async function submitAlbum() {
  if (selectedRating===null) { alert('Pick a rating'); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent='SAVING...';
  let title, artist, cover='', genre='';
  if (selectedAlbumData) {
    ({ title, artist, cover, genre } = selectedAlbumData);
  } else {
    title = document.getElementById('manualTitle').value.trim();
    artist = document.getElementById('manualArtist').value.trim();
    genre = document.getElementById('manualGenre').value.trim();
    if (!title||!artist) { btn.disabled=false; btn.textContent='LOG ALBUM'; alert('Enter title and artist'); return; }
    // use uploaded cover if provided, otherwise try Spotify
    if (manualCoverDataUrl) {
      cover = manualCoverDataUrl;
    } else {
      const info = await spotifyFetchCover(title, artist);
      cover = info.cover;
    }
  }
  const emoji = document.getElementById('emojiInput').value.trim();
  const notes = document.getElementById('notesInput').value.trim();
  albums.push({ id: Date.now(), title, artist, rating: selectedRating, emoji: selectedRating===10?emoji:'', notes, cover, genre, fav: false, dateAdded: Date.now() });
  save();
  btn.disabled=false; btn.textContent='LOG ALBUM';
  manualCoverDataUrl = null;
  closeAdd();
  switchTab('wall');
}

// ── SEED INIT ──
async function initSeed() {
  const now = Date.now();
  albums = seedAlbums.map((a,i) => ({
    id: now-(seedAlbums.length-i)*1000,
    title:a.title, artist:a.artist, rating:a.rating, emoji:a.emoji, notes:a.notes,
    cover:'', genre:'', fav:false, dateAdded:now-(seedAlbums.length-i)*1000
  }));
  save(); renderAll();
  const banner = document.getElementById('fetchBanner');
  banner.style.display = 'block';
  for (let i=0; i<albums.length; i++) {
    banner.textContent = `Fetching covers from Spotify... ${i+1}/${albums.length}`;
    const info = await spotifyFetchCover(albums[i].title, albums[i].artist);
    albums[i].cover = info.cover;
    if (i%5===0) { save(); renderAll(); }
  }
  save(); renderAll();
  banner.style.display = 'none';
}

// ── BOOT ──
async function boot() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    window.history.replaceState({}, '', window.location.pathname);
    spotifyToken = await exchangeCode(code);
  } else {
    spotifyToken = getStoredToken();
  }

  if (!spotifyToken) {
    document.getElementById('loginScreen').style.display = 'flex';
    return;
  }

  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';

  load();
  renderAll();

  if (albums.length === 0) {
    await initSeed();
  } else {
    const missing = albums.filter(a => !a.cover);
    if (missing.length > 0) {
      const banner = document.getElementById('fetchBanner');
      banner.style.display = 'block';
      let done = 0;
      for (let i=0; i<albums.length; i++) {
        if (!albums[i].cover) {
          banner.textContent = `Fetching missing covers... ${++done}/${missing.length}`;
          const info = await spotifyFetchCover(albums[i].title, albums[i].artist);
          albums[i].cover = info.cover;
          if (done%5===0) { save(); renderAll(); }
        }
      }
      save(); renderAll();
      banner.style.display = 'none';
    }
  }
}

boot();
</script>
